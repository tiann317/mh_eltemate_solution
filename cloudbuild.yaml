steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_PUBLISHABLE_KEY=${_VITE_SUPABASE_PUBLISHABLE_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aegis-notice'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aegis-notice']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aegis-notice'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aegis-notice'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'LDA_CLIENT_ID=${_LDA_CLIENT_ID},LDA_CLIENT_SECRET=${_LDA_CLIENT_SECRET}'

substitutions:
  _LDA_CLIENT_ID: ''
  _LDA_CLIENT_SECRET: ''
  _VITE_SUPABASE_URL: 'https://placeholder.supabase.co'
  _VITE_SUPABASE_PUBLISHABLE_KEY: 'placeholder-anon-key'

options:
  logging: CLOUD_LOGGING_ONLY
